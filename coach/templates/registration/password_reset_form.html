{% extends "coach/base.html" %}
{% block title %}Reset password - AI Coach{% endblock %}
{% block content %}
<div class="flex items-center justify-center py-12">
  <div class="card p-8 w-full max-w-sm">
    <h1 class="text-xl font-semibold mb-1 text-center">Reset your password</h1>
    <p class="text-sm text-slate-500 mb-6 text-center">Enter your email and we'll send a reset link.</p>
    <form method="post">
      {% csrf_token %}
      <div class="mb-6">
        <label class="block text-xs font-medium text-slate-500 mb-1">Email</label>
        <input type="email" name="email" required autofocus
          class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500">
      </div>
      <button class="w-full bg-emerald-600 text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-emerald-700">
        Send reset link
      </button>
    </form>
    <p class="text-xs text-slate-400 text-center mt-4">
      <a href="{% url 'login' %}" class="text-emerald-600 hover:underline">Back to sign in</a>
    </p>
  </div>
</div>
{% endblock %}
